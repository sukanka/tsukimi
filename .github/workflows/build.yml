name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - "*"
    paths-ignore:
      - "docs/**"
      - "**/.gitignore"
      - "**/.dockerignore"
      - LICENSE
      - "**/*.md"
    tags:
      - "*"
  pull_request:
    branches:
      - "main"
    paths-ignore:
      - "docs/**"
      - "**/.gitignore"
      - "**/.dockerignore"
      - LICENSE
      - "**/*.md"

permissions:
  contents: write

jobs:
  clippy_check:
    name: Check
    uses: ./.github/workflows/cargo_clippy_check.yaml
    secrets: inherit

  linux_ubuntu:
    name: Linux (Ubuntu)
    uses: ./.github/workflows/build_linux.yml
    secrets: inherit

  linux_archlinux:
    name: Linux (Arch Linux)
    uses: ./.github/workflows/build_archlinux.yml
    secrets: inherit

  windows:
    name: Windows
    uses: ./.github/workflows/build_windows.yml
    secrets: inherit

  artifacts:
    name: Artifacts
    if: ${{ github.event_name != 'pull_request' }}
    uses: ./.github/workflows/artifacts.yml
    needs: [ linux_ubuntu, linux_archlinux, windows ]
    secrets: inherit
